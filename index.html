<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>random game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            background-color: #1a1a1a;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: none;
        }

        .scoreboard {
            display: flex;
            gap: 40px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .score-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .score-value {
            font-size: 36px;
            color: #4ade80;
        }

        .instructions {
            color: white;
            text-align: center;
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .instructions strong {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div class="score-item">
                <span class="score-label">PLAYER</span>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <span class="score-label">COMPUTER</span>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="instructions">
            <div><strong>Controls:</strong></div>
            <div>🖱️ Move mouse up/down OR ⬆️⬇️ Arrow keys to control left paddle</div>
            <div>🤖 Computer controls right paddle automatically</div>
            <div>Press <strong>SPACE</strong> to start/pause</div>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;
        const ballSpeed = 5;

        // Player paddle (left)
        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6
        };

        // Computer paddle (right)
        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 4.5
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: ballSpeed,
            dy: ballSpeed,
            size: ballSize
        };

        // Game state
        let playerScore = 0;
        let computerScore = 0;
        let gameRunning = true;

        // Input handling
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                gameRunning = !gameRunning;
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mouse tracking for player paddle
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            // Move paddle smoothly to mouse position
            const targetY = mouseY - paddleHeight / 2;
            player.y = targetY;
        });

        // Handle arrow keys for paddle movement
        function handlePlayerMovement() {
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) {
                player.y += player.speed;
            }
        }

        // Computer AI
        function updateComputer() {
            const computerCenter = computer.y + computer.height / 2;
            const ballCenter = ball.y;

            // Add some lag to make it beatable
            if (computerCenter < ballCenter - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ballCenter + 35) {
                computer.y -= computer.speed;
            }

            // Keep computer paddle within bounds
            if (computer.y < 0) computer.y = 0;
            if (computer.y > canvas.height - computer.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        // Update ball position
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            // Ball collision with paddles
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.size;
                // Add spin based on where ball hits paddle
                ball.dy += (ball.y - (player.y + player.height / 2)) * 0.1;
            }

            if (
                ball.x + ball.size > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.size;
                ball.dy += (ball.y - (computer.y + computer.height / 2)) * 0.1;
            }

            // Score points and reset
            if (ball.x < 0) {
                computerScore++;
                resetBall();
                document.getElementById('computerScore').textContent = computerScore;
            }
            if (ball.x > canvas.width) {
                playerScore++;
                resetBall();
                document.getElementById('playerScore').textContent = playerScore;
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = ballSpeed * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = ballSpeed * (Math.random() * 2 - 1);
        }

        // Draw functions
        function drawPaddle(paddle) {
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowColor = '#4ade80';
            ctx.shadowBlur = 10;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;
        }

        function drawBall() {
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawCenter() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            drawCenter();

            // Draw paddles
            drawPaddle(player);
            drawPaddle(computer);

            // Draw ball
            drawBall();

            // Draw game status
            if (!gameRunning) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px Arial';
                ctx.fillText('Press SPACE to resume', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        // Main game loop
        function gameLoop() {
            if (gameRunning) {
                handlePlayerMovement();
                updateBall();
                updateComputer();
            }

            drawGame();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
